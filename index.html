<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>搖搖跑馬仔 - 一分鐘挑戰版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #333; font-family: sans-serif; touch-action: none; }
        canvas { 
            display: block; 
            background-color: #f7f7f7; 
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center;
        }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 20px; font-weight: bold; z-index: 10; text-shadow: 2px 2px 4px #000; }
        #timer-box { position: absolute; top: 20px; right: 20px; color: #ffeb3b; font-size: 24px; font-weight: bold; z-index: 10; text-shadow: 2px 2px 4px #000; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 20; background: rgba(255,255,255,0.95); padding: 30px; border-radius: 15px; width: 80%; max-width: 300px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        button { padding: 12px 25px; font-size: 18px; cursor: pointer; background: #535353; color: white; border: none; border-radius: 8px; margin-top: 15px; }
        .success { color: #4caf50; font-size: 28px; }
        .fail { color: #f44336; font-size: 28px; }
    </style>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>
    <div id="timer-box">Time: <span id="time">60</span>s</div>
    
    <div id="msg">
        <h2 id="status">挑戰一分鐘！</h2>
        <p id="sub-status">藍色馬跑緊，通關變紅馬</p>
        <button id="startBtn">載入中...</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const msgEl = document.getElementById('msg');
    const statusEl = document.getElementById('status');
    const subStatusEl = document.getElementById('sub-status');
    const startBtn = document.getElementById('startBtn');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- 圖片載入 ---
    const imgPink = new Image();
    imgPink.src = 'dino_pink_idle.png';
    const imgBlue = new Image();
    imgBlue.src = 'dino_blue_running.png';

    let pinkLoaded = false, blueLoaded = false;
    imgPink.onload = () => { pinkLoaded = true; checkReady(); };
    imgBlue.onload = () => { blueLoaded = true; checkReady(); };
    setTimeout(checkReady, 2000); 

    function checkReady() { startBtn.innerText = "開始跑！"; }

    // --- 遊戲變數 ---
    let gameRunning = false;
    let score = 0;
    let timeLeft = 60;
    let tiltY = 0; 
    let frame = 0;
    let obstacles = [];
    let dino = { x: 50, y: 200, w: 80, h: 80 }; 
    let dinoState = 'pink'; // 'pink' 或 'blue'
    let timerInterval;

    function handleOrientation(event) {
        let beta = event.beta; 
        if (beta === null) return;
        tiltY = (beta - 45) * 1.5; 
    }

    function drawDino() {
        if (dinoState === 'blue' && blueLoaded) {
            ctx.drawImage(imgBlue, dino.x, dino.y, dino.w, dino.h);
        } else if (dinoState === 'pink' && pinkLoaded) {
            ctx.drawImage(imgPink, dino.x, dino.y, dino.w, dino.h);
        } else {
            ctx.fillStyle = (dinoState === 'blue') ? 'blue' : 'pink';
            ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
        }
    }

    function init() {
        gameRunning = true;
        dinoState = 'blue'; // 跑緊嗰陣變藍色
        score = 0;
        timeLeft = 60;
        obstacles = [];
        frame = 0;
        dino.y = canvas.height / 2;
        
        scoreEl.innerText = "0";
        timeEl.innerText = "60";
        msgEl.style.display = 'none';

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            timeEl.innerText = timeLeft;
            if (timeLeft <= 0) winGame();
        }, 1000);

        animate();
    }

    function animate() {
        if (!gameRunning) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 畫上下紅線
        ctx.fillStyle = 'rgba(255, 0, 0, 0.6)';
        ctx.fillRect(0, 0, canvas.width, 10);
        ctx.fillRect(0, canvas.height - 10, canvas.width, 10);

        dino.y += tiltY;

        if (dino.y <= 10 || (dino.y + dino.h) >= canvas.height - 10) {
            gameOver("跌咗落馬！"); return;
        }

        drawDino();

        if (frame % 70 === 0) {
            obstacles.push({ x: canvas.width, y: 50 + Math.random()*(canvas.height-150), w: 40, h: 70, passed: false });
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= (7 + (score / 400));
            ctx.fillStyle = '#333';
            ctx.fillRect(o.x, o.y, o.w, o.h);

            if (dino.x < o.x + o.w && dino.x + dino.w > o.x && dino.y < o.y + o.h && dino.y + dino.h > o.y) {
                gameOver("撞到障礙物！"); return;
            }

            if (o.x + o.w < dino.x && !o.passed) {
                score += 10; o.passed = true; scoreEl.innerText = score;
            }
            if (o.x < -o.w) obstacles.splice(i, 1);
        }

        frame++;
        requestAnimationFrame(animate);
    }

    function winGame() {
        stopGame();
        dinoState = 'pink'; // 通關：變返紅色
        statusEl.innerHTML = "<span class='success'>🎉 挑戰成功！</span>";
        subStatusEl.innerText = "你成功生存咗 60 秒！";
        updateFinalFrame();
    }

    function gameOver(reason) {
        stopGame();
        dinoState = 'blue'; // 失敗：維持藍色
        statusEl.innerHTML = "<span class='fail'>☠️ 挑戰失敗</span>";
        subStatusEl.innerText = reason;
        updateFinalFrame();
    }

    function stopGame() {
        gameRunning = false;
        clearInterval(timerInterval);
        window.removeEventListener('deviceorientation', handleOrientation);
    }

    function updateFinalFrame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(255, 0, 0, 0.6)';
        ctx.fillRect(0, 0, canvas.width, 10);
        ctx.fillRect(0, canvas.height - 10, canvas.width, 10);
        
        // 畫障礙物殘影
        obstacles.forEach(o => {
            ctx.fillStyle = '#333';
            ctx.fillRect(o.x, o.y, o.w, o.h);
        });

        drawDino(); // 呢度會根據 dinoState 決定畫咩色
        msgEl.style.display = 'block';
        startBtn.innerText = "再試一次";
    }

    startBtn.onclick = () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(state => {
                if (state === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                    init();
                }
            });
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
            init();
        }
    };
</script>
</body>
</html>
